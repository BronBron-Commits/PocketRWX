<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PocketRWX GLB Viewer</title>
  <style>
    html,body{margin:0;height:100%;background:#080808;color:white;font-family:system-ui;overflow:hidden}
    #bar{position:fixed;top:0;left:0;right:0;z-index:10;background:rgba(0,0,0,.7);padding:8px;display:flex;gap:8px;align-items:center}
    #debug{position:fixed;bottom:0;left:0;right:0;z-index:10;background:rgba(0,0,0,.75);color:#0f0;font-family:monospace;font-size:12px;padding:6px}
  </style>
</head>
<body>
  <div id="bar">
    <input id="file" type="file" accept=".glb,.gltf" />
    <button id="loadSample">Load exported GLB</button>
    <span>GLB Viewer</span>
  </div>
  <div id="debug">ready</div>
  <script type="module" src="/src/glb_viewer.js"></script>
</body>
</html>
