<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PocketRWX Preview</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #111;
      color: white;
      font-family: sans-serif;
    }

    #hud {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 10;
      background: rgba(0,0,0,.6);
      padding: 10px;
      border-radius: 8px;
    }

    button {
      margin: 2px;
    }
  
#log{
position:fixed;
left:10px;
bottom:10px;
width:45vw;
max-height:40vh;
overflow:auto;
background:rgba(0,0,0,.85);
color:#00ff88;
font:12px monospace;
padding:10px;
z-index:1000;
white-space:pre-wrap;
border:1px solid #333;
}
</style>

</head>
<body>
<div id="log"></div>
<div id="hud">
  <div>PocketRWX GLB → RWX Preview</div>

  <button onclick="loadRWX('samples/real_glb/barrel_textured.rwx')">
    Barrel
  </button>

  <button onclick="loadRWX('samples/real_glb/hammer.rwx')">
    Hammer
  </button>

  <button onclick="loadRWX('samples/real_glb/training_dummy.rwx')">
    Training Dummy
  </button>
</div>

<script type="module">
import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);


const logEl = document.getElementById("log");

function log(...args){
  const msg = args.map(a =>
    typeof a === "object"
      ? JSON.stringify(a, null, 2)
      : String(a)
  ).join(" ");

  console.log(...args);

  logEl.textContent += msg + "\n";
  logEl.scrollTop = logEl.scrollHeight;
}

window.onerror = (msg, src, line, col, err) => {
  log("ERROR:", msg, "line", line, "col", col);
  if (err?.stack) log(err.stack);
};

window.onunhandledrejection = e => {
  log("PROMISE ERROR:", e.reason?.stack || e.reason);
};

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(
  70,
  window.innerWidth / window.innerHeight,
  0.01,
  1000
);

camera.position.set(0, 2, 6);

const light = new THREE.DirectionalLight(0xffffff, 2);
light.position.set(5, 10, 5);
scene.add(light);

scene.add(new THREE.AmbientLight(0xffffff, 1));

let currentMesh = null;

async function loadRWX(url) {
  logEl.textContent = "";
  log("loading", url);

  const text = await fetch(url).then(r => r.text());

  const verts = [];
  const groups = [];

  let currentTexture = null;
  let currentColor = new THREE.Color(1, 1, 1);
  let currentTris = [];

  function pushGroup() {
    if (!currentTris.length) return;
    groups.push({
      texture: currentTexture,
      color: currentColor.clone(),
      tris: currentTris
    });
    currentTris = [];
  }

  for (const raw of text.split("\n")) {
    const line = raw.trim();
    if (!line || line.startsWith("#")) continue;

    const parts = line.split(/\s+/);
    const cmd = parts[0];

    if (cmd === "Texture") {
      pushGroup();
      currentTexture = parts.slice(1).join(" ");
      continue;
    }

    if (cmd === "Color") {
      currentColor = new THREE.Color(
        parseFloat(parts[1]),
        parseFloat(parts[2]),
        parseFloat(parts[3])
      );
      continue;
    }

    if (cmd === "Vertex") {
      const uvIndex = parts.indexOf("UV");
      verts.push({
        pos: [parseFloat(parts[1]), parseFloat(parts[2]), parseFloat(parts[3])],
        uv: uvIndex >= 0
          ? [parseFloat(parts[uvIndex + 1]), parseFloat(parts[uvIndex + 2])]
          : [0, 0]
      });
      continue;
    }

    if (cmd === "Triangle") {
      currentTris.push([
        parseInt(parts[1]) - 1,
        parseInt(parts[2]) - 1,
        parseInt(parts[3]) - 1
      ]);
      continue;
    }
  }

  pushGroup();

  log("parsed", {
    verts: verts.length,
    groups: groups.length,
    tris: groups.reduce((n, g) => n + g.tris.length, 0)
  });

  const root = new THREE.Group();

  for (const group of groups) {
    const positions = [];
    const uvs = [];

    for (const tri of group.tris) {
      for (const i of tri) {
        const v = verts[i];
        if (!v) continue;
        positions.push(...v.pos);
        uvs.push(...v.uv);
      }
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute("position", new THREE.Float32BufferAttribute(positions, 3));
    geo.setAttribute("uv", new THREE.Float32BufferAttribute(uvs, 2));
    geo.computeVertexNormals();

    let texture = null;

    if (group.texture) {
      try {
        texture = await new THREE.TextureLoader().loadAsync(group.texture);
        texture.flipY = false;
        texture.colorSpace = THREE.SRGBColorSpace;
      } catch (e) {
        log("texture failed", group.texture, e.message || e);
      }
    }

    const mat = new THREE.MeshStandardMaterial({
      color: group.color,
      map: texture,
      side: THREE.DoubleSide
    });

    root.add(new THREE.Mesh(geo, mat));

    log("mesh", {
      tris: group.tris.length,
      texture: group.texture,
      textureLoaded: !!texture
    });
  }

  const box = new THREE.Box3().setFromObject(root);
  const center = new THREE.Vector3();
  const size = new THREE.Vector3();

  box.getCenter(center);
  box.getSize(size);

  root.traverse(o => {
    if (!o.isMesh) return;

    const pos = o.geometry.attributes.position;

    for (let i = 0; i < pos.count; i++) {
      pos.setXYZ(
        i,
        pos.getX(i) - center.x,
        pos.getY(i) - center.y,
        pos.getZ(i) - center.z
      );
    }

    pos.needsUpdate = true;
    o.geometry.computeBoundingSphere();
  });

  const maxDim = Math.max(size.x, size.y, size.z) || 1;
  const scale = 3 / maxDim;

  root.scale.setScalar(scale);

  if (currentMesh) scene.remove(currentMesh);

  currentMesh = root;
  scene.add(root);

  camera.position.set(0, 1.2, 5);
  camera.lookAt(0, 0, 0);

  log("root added", {
    children: root.children.length,
    scale: root.scale.x
  });
}
loadRWX('samples/real_glb/everything_textured.rwx');

function animate() {
  requestAnimationFrame(animate);

  if (currentMesh) {
    currentMesh.rotation.y += 0.003;
  }

  renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();

  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
